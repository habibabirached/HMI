
# virtual networks
networks:
  dcs_network:    
    driver: bridge

services:
  dcs-ui:
    image: dtr.research.ge.com/data_center_simulator/dcs-ui:latest
    build:
      context: ./dcs-ui
      dockerfile: Dockerfile
      args:
        DOCKER_DEFAULT_PLATFORM: ${DOCKER_DEFAULT_PLATFORM}
    environment:
      - https_proxy=${HTTPS_PROXY}
      - http_proxy=${HTTP_PROXY}
      - no_proxy=${NO_PROXY}
      - SERVER_HOSTNAME=host.docker.internal
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      dcs_network:
        aliases:
          - dcs_ui
    ulimits:
      nproc: 65535
      nofile: 65536
    volumes:
      - "./dcs-ui/src:/app/src"
      - "./dcs-ui/public:/app/public"
