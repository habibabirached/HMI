
# virtual networks
networks:
  dcs_network:    
    driver: bridge

services:
  # -------------------------------------------------------------------------
  # dcs-cicd — COMMENTED OUT (auto-deploy on git poll)
  # This container ran cron every ~2 min, fetched origin, and pulled/rebuilt when
  # you pushed. To stop “it runs when I check in,” we do not start it anymore.
  # Restore: uncomment the block below, optionally uncomment the job line in
  # dcs-cicd/command-cron, then: docker compose -f docker-compose-dev.yml up -d dcs-cicd
  # -------------------------------------------------------------------------
  # dcs-cicd:
  #   image: dtr.research.ge.com/data_center_simulator/dcs-cicd:latest
  #   build:
  #     context: ./dcs-cicd
  #     dockerfile: Dockerfile
  #   environment:
  #     - https_proxy=${HTTPS_PROXY}
  #     - http_proxy=${HTTP_PROXY}
  #     - no_proxy=${NO_PROXY}
  #   networks:
  #     dcs_network:
  #       aliases:
  #         - dcs_cicd
  #   volumes:
  #     - "~/.ssh:/root/.ssh"  # so we can access git repos with ssh keys
  #     - "./:/app"  # mount root project folder in the container /app folder
  #     - "./poll-git.sh:/app/command.sh"  # to override the default command in the Dockerfile
  #     - "/var/run/docker.sock:/var/run/docker.sock"  # allow CI/CD container to control docker

  dcs-ui:
    image: dtr.research.ge.com/data_center_simulator/dcs-ui:latest
    build:
      context: ./dcs-ui
      dockerfile: Dockerfile
      args:
        DOCKER_DEFAULT_PLATFORM: ${DOCKER_DEFAULT_PLATFORM}
    environment:
      - https_proxy=${HTTPS_PROXY}
      - http_proxy=${HTTP_PROXY}
      - no_proxy=${NO_PROXY}
      - SERVER_HOSTNAME=host.docker.internal
      # Empty => browser calls /api/... on :3000; CRA dev server proxies to backend (see dcs-ui/package.json "proxy").
      - REACT_APP_API_BASE_URL=
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      dcs_network:
        aliases:
          - dcs_ui
    ulimits:
      nproc: 65535
      nofile: 65536
    volumes:
      - "./dcs-ui/src:/app/src"
      - "./dcs-ui/public:/app/public"

  # ==========================================================================
  # BACKEND SERVICE - Python FastAPI Server
  # ==========================================================================
  # This is the backend API server that handles saving/loading configurations.
  # 
  # WHAT IT DOES:
  # - Provides REST API endpoints (save, load, list)
  # - Manages database storage
  # - Saves configuration files to disk
  # - Communicates with frontend (dcs-ui)
  #
  # ACCESS:
  # - API: http://localhost:5000
  # - Health check: http://localhost:5000/health
  # - API docs: http://localhost:5000/docs
  # ==========================================================================
  dcs-backend:
    image: dtr.research.ge.com/data_center_simulator/dcs-backend:latest
    build:
      context: ./dcs-backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "5000", "--reload"]
    environment:
      - https_proxy=${HTTPS_PROXY}
      - http_proxy=${HTTP_PROXY}
      - no_proxy=${NO_PROXY}
      - DATABASE_URL=sqlite:///./datacenter.db
      - ENVIRONMENT=development
    ports:
      - "5000:5000"                        # Backend API port
    networks:
      dcs_network:
        aliases:
          - dcs_backend
    volumes:
      - "./dcs-backend:/app"               # Mount backend code (live reload)
      - "./dcs-backend/designs:/app/designs"  # Persist design dirs (Save As, etc.)
    depends_on:
      - dcs-ui                             # Start UI first

