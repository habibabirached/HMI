<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Center Power System Designer — System Architecture</title>
  <style>
    body {
      margin: 0;
      background: #f5f7fa;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    svg {
      width: 100vw;
      height: 100vh;
    }

    .lane {
      fill: #eef2f7;
      stroke: #d0d7e2;
      stroke-width: 1;
    }

    .lane-title {
      font-size: 14px;
      font-weight: 600;
      fill: #374151;
    }

    .box {
      fill: #ffffff;
      stroke: #3b82f6;
      stroke-width: 1.5;
      rx: 12;
      ry: 12;
    }

    .box-title {
      font-size: 13px;
      font-weight: 600;
      fill: #1e3a8a;
    }

    .box-text {
      font-size: 11px;
      fill: #374151;
    }

    .arrow {
      stroke: #374151;
      stroke-width: 1.2;
      fill: none;
      marker-end: url(#arrowhead);
    }

    .arrow-label {
      font-size: 10px;
      fill: #374151;
      background: #fff;
    }
  </style>
</head>
<body>

<svg viewBox="0 0 1400 900">

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
      refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle"
        style="font-size:24px;font-weight:700;fill:#111827">
    Data Center Power System Designer — System Architecture
  </text>

  <!-- Lanes -->
  <rect class="lane" x="40" y="80"  width="1320" height="120"/>
  <rect class="lane" x="40" y="220" width="1320" height="150"/>
  <rect class="lane" x="40" y="390" width="1320" height="150"/>
  <rect class="lane" x="40" y="560" width="1320" height="140"/>
  <rect class="lane" x="40" y="720" width="1320" height="120"/>

  <!-- Lane titles -->
  <text class="lane-title" x="50" y="105">CLIENT / PRESENTATION</text>
  <text class="lane-title" x="50" y="245">APPLICATION / BACKEND SERVICES</text>
  <text class="lane-title" x="50" y="415">INTEGRATION MODALITIES</text>
  <text class="lane-title" x="50" y="585">SIMULATION & PHYSICS</text>
  <text class="lane-title" x="50" y="745">INFRASTRUCTURE</text>

  <!-- React -->
  <rect class="box" x="120" y="120" width="320" height="70"/>
  <text class="box-title" x="140" y="145">React HMI (Browser)</text>
  <text class="box-text" x="140" y="162">
    Design / Simulation / Data Visualization
  </text>
  <text class="box-text" x="140" y="178">
    D3 • Plotly • Chart.js
  </text>

  <!-- FastAPI -->
  <rect class="box" x="520" y="120" width="360" height="70"/>
  <text class="box-title" x="540" y="145">FastAPI Backend (Python, Docker)</text>
  <text class="box-text" x="540" y="162">
    REST API • Validation • Async Tasks • WebSockets
  </text>

  <!-- PostgreSQL -->
  <rect class="box" x="940" y="120" width="300" height="70"/>
  <text class="box-title" x="960" y="145">PostgreSQL Database</text>
  <text class="box-text" x="960" y="162">
    Configurations • Components • Simulation Results
  </text>

  <!-- Modalities -->
  <rect class="box" x="140" y="430" width="300" height="80"/>
  <text class="box-title" x="160" y="455">Modality 1: CSV Upload</text>
  <text class="box-text" x="160" y="472">
    Manual PSCAD Export • Parsing • Validation
  </text>

  <rect class="box" x="520" y="430" width="300" height="80"/>
  <text class="box-title" x="540" y="455">Modality 2: DB Integration</text>
  <text class="box-text" x="540" y="472">
    Direct Queries • Batch / Cached Results
  </text>

  <rect class="box" x="900" y="430" width="300" height="80"/>
  <text class="box-title" x="920" y="455">Modality 3: Live API</text>
  <text class="box-text" x="920" y="472">
    Python API • Async Execution • Event Streaming
  </text>

  <!-- FlexSim -->
  <rect class="box" x="360" y="610" width="360" height="80"/>
  <text class="box-title" x="380" y="635">FlexSim Automation (Python)</text>
  <text class="box-text" x="380" y="652">
    CSV Param Files • Event Scheduling • Pickle Output
  </text>

  <!-- PSCAD -->
  <rect class="box" x="820" y="610" width="360" height="80"/>
  <text class="box-title" x="840" y="635">PSCAD Simulation Engine</text>
  <text class="box-text" x="840" y="652">
    Power Network Models • Protection & Control Logic
  </text>

  <!-- Infra -->
  <rect class="box" x="420" y="760" width="560" height="60"/>
  <text class="box-title" x="440" y="785">Docker / On-Prem Server</text>
  <text class="box-text" x="440" y="802">
    Customer Experience Center • Frontend + Backend Containers
  </text>

  <!-- Arrows -->
  <path class="arrow" d="M440 155 L520 155"/>
  <text class="arrow-label" x="470" y="145">HTTPS / REST</text>

  <path class="arrow" d="M880 155 L940 155"/>
  <text class="arrow-label" x="900" y="145">SQLAlchemy</text>

  <path class="arrow" d="M680 190 L290 430"/>
  <text class="arrow-label" x="450" y="300">CSV</text>

  <path class="arrow" d="M700 190 L670 430"/>
  <text class="arrow-label" x="680" y="300">SQL</text>

  <path class="arrow" d="M720 190 L1040 430"/>
  <text class="arrow-label" x="880" y="300">Python API</text>

  <path class="arrow" d="M290 510 L540 610"/>
  <path class="arrow" d="M670 510 L540 610"/>
  <path class="arrow" d="M1040 510 L540 610"/>

  <path class="arrow" d="M720 650 L820 650"/>
  <text class="arrow-label" x="760" y="640">Python API</text>

  <path class="arrow" d="M1000 610 L700 190"/>
  <text class="arrow-label" x="880" y="380">Results / Events</text>

</svg>

</body>
</html>
